<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pixsort — Onboarding</title>
<style>
  /* ─── PixSort design tokens ───────────────────────── */
  :root {
    --color-bg:           #F0EBE0;
    --color-bg-card:      #E8E2D6;
    --color-bg-card-inner:#EDE7DB;
    --color-bg-pill:      #E4DDD1;
    --color-bg-icon:      #E8C87A;
    --color-bg-white:     #FFFFFF;
    --color-gold:         #C4A060;
    --color-gold-light:   #D4B578;
    --color-gold-dark:    #A8864A;
    --color-pink:         #E87FA0;
    --color-pink-light:   #F0A8BE;
    --color-lavender:     #B8A8CC;
    --color-peach:        #E8A090;
    --color-bg-logo:      #F2AABF;
    --color-text-primary:   #2D2A22;
    --color-text-secondary: #8A7E6E;
    --color-text-tertiary:  #B0A898;
    --color-text-on-dark:   #F0EBE0;
    --color-border:         #DDD7CB;
  }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #1f1d1a;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #2D2A22;
  }
  body { overflow: hidden; }
  #root { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }

  /* Screen base */
  .pix-screen {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    background: #F0EBE0; color: #2D2A22; overflow: hidden;
  }
  .pix-stage { position: relative; flex: 1; width: 100%; overflow: hidden; }
  .pix-stage--centered { display: flex; flex-direction: column; align-items: center; }
  .pix-screen-header {
    width: 100%; padding: 8px 28px 0; box-sizing: border-box;
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .pix-screen-header > * { margin: 0; }
  .pix-screen-header .pix-title { max-width: 320px; }
  .pix-screen-header .pix-sub   { max-width: 300px; }

  .pix-title { font-size: 34px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.05; color: #2D2A22; text-wrap: balance; text-align: center; }
  .pix-sub   { font-size: 16px; font-weight: 400; line-height: 1.4; color: #6E6557; text-wrap: pretty; text-align: center; }
  .pix-eyebrow { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: #C4A060; font-weight: 700; }

  /* Orbit arrows */
  @keyframes orbit-arrow-flow {
    from { stroke-dashoffset: 0; }
    to   { stroke-dashoffset: -16; }
  }
  .orbit-arrow { animation: orbit-arrow-flow 1.6s linear infinite; }
  .orbit-stage[data-phase="syncing"] .orbit-arrow,
  .orbit-stage[data-phase="done"]    .orbit-arrow { opacity: 0; transition: opacity 400ms ease; }

  /* Pill CTA */
  .pix-cta {
    display: block; width: 100%; padding: 18px 0; border: 0; cursor: pointer;
    background: #2D2A22; color: #F0EBE0;
    font-family: inherit; font-size: 17px; font-weight: 700; letter-spacing: -0.005em;
    border-radius: 999px; box-shadow: 0 1px 2px rgba(45,42,34,0.18), 0 8px 24px rgba(45,42,34,0.10);
    transition: transform 120ms ease, background 120ms ease;
  }
  .pix-cta:active { transform: scale(0.98); background: #1a1812; }
  .pix-cta--gold { background: #C4A060; color: #fffdf5; box-shadow: 0 1px 2px rgba(168,134,74,0.35), 0 10px 28px rgba(196,160,96,0.30); }
  .pix-cta--gold:active { background: #A8864A; }

  /* Header bar — clear of dynamic island */
  .pix-header { display: flex; align-items: center; justify-content: space-between; padding: 56px 22px 0; min-height: 32px; }
  .pix-back, .pix-skip { background: transparent; border: 0; padding: 8px 6px; font: inherit; cursor: pointer; color: #8A7E6E; font-size: 15px; font-weight: 500; }
  .pix-back { color: #2D2A22; }
  .pix-back svg { display: block; }

  /* Dots */
  .pix-dots { display: flex; gap: 6px; align-items: center; }
  .pix-dot { width: 6px; height: 6px; border-radius: 999px; background: #D8D0C0; transition: width 220ms ease, background 220ms ease; }
  .pix-dot--active { background: #C4A060; width: 22px; }

  /* Album tile */
  .pix-tile {
    width: 96px; background: #FFFFFF; border-radius: 16px; overflow: hidden;
    box-shadow: 0 2px 4px rgba(45,42,34,0.05), 0 14px 32px rgba(45,42,34,0.12);
    font-family: inherit;
  }
  .pix-tile-art { height: 64px; display: flex; align-items: center; justify-content: center; color: #2D2A22; }
  .pix-tile-meta { padding: 8px 10px 10px; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .pix-tile-label { font-size: 12px; font-weight: 700; color: #2D2A22; letter-spacing: -0.005em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pix-tile-count { font-size: 11px; color: #8A7E6E; font-weight: 600; font-variant-numeric: tabular-nums; }
  .pix-tile--sm { width: 76px; border-radius: 14px; }
  .pix-tile--sm .pix-tile-art { height: 52px; }
  .pix-tile--sm .pix-tile-meta { padding: 6px 8px 8px; }
  .pix-tile--sm .pix-tile-label { font-size: 11px; }
  .pix-tile--sm .pix-tile-count { font-size: 10px; }

  /* Float */
  @keyframes pix-float-a { 0%,100% { transform: translateY(0) rotate(var(--rot,0deg)); } 50% { transform: translateY(-6px) rotate(var(--rot,0deg)); } }
  @keyframes pix-float-b { 0%,100% { transform: translateY(0) rotate(var(--rot,0deg)); } 50% { transform: translateY(-4px) rotate(var(--rot,0deg)); } }
  .pix-floater { animation: pix-float-a 4.5s ease-in-out infinite; }
  .pix-floater--slow { animation: pix-float-b 6s ease-in-out infinite; }

  /* Entrance */
  @keyframes pix-enter-stage { from { opacity: 0; transform: translateY(14px) scale(0.98); } to { opacity: 1; transform: none; } }
  @keyframes pix-enter-title { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .pix-screen[data-enter="1"] .pix-stage > * { animation: pix-enter-stage 600ms cubic-bezier(.2,.7,.2,1) both; }
  .pix-screen[data-enter="1"] .pix-foot { animation: pix-enter-title 700ms 80ms cubic-bezier(.2,.7,.2,1) both; }

  /* Mascot */
  .pix-mascot {
    width: 132px; height: 132px; border-radius: 28px;
    box-shadow: 0 6px 18px rgba(232,127,160,0.25), 0 24px 60px rgba(45,42,34,0.18);
    background-size: cover; background-position: center;
  }

  .pix-foot { padding: 14px 24px 26px; display: flex; flex-direction: column; gap: 14px; }

  /* Welcome hero */
  .welcome-glow {
    position: absolute; inset: -10% 5% 10% 5%;
    background: radial-gradient(60% 50% at 50% 45%, rgba(232,127,160,0.35), rgba(184,168,204,0.18) 45%, transparent 75%);
    filter: blur(0.5px); pointer-events: none;
  }

  /* Create-album card */
  .create-card {
    background: #fff; border-radius: 22px;
    box-shadow: 0 2px 6px rgba(45,42,34,0.06), 0 20px 50px rgba(45,42,34,0.16);
    padding: 18px; width: 240px;
  }
  .create-card-label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #B0A898; font-weight: 700; }
  .create-card-input {
    margin-top: 8px; padding: 12px 14px; border-radius: 12px;
    background: #F4EFE3; color: #2D2A22; font-weight: 700; font-size: 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .create-card-input::after { content: ""; width: 1.5px; height: 18px; background: #C4A060; animation: pix-caret 1s steps(1) infinite; margin-left: 4px; }
  @keyframes pix-caret { 50% { opacity: 0; } }
  .create-card-iconrow { display: flex; gap: 10px; margin-top: 14px; }
  .create-card-iconrow > div { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .create-card-iconrow > div.is-selected { box-shadow: 0 0 0 2.5px #C4A060, 0 0 0 4.5px #fff; }

  /* Photos icon */
  .ios-photos {
    width: 96px; height: 96px; border-radius: 22px;
    background: #fff;
    box-shadow: 0 2px 6px rgba(45,42,34,0.10), 0 18px 44px rgba(45,42,34,0.22);
    display: flex; align-items: center; justify-content: center;
  }

  /* Sync orbit */
  .orbit-center { transition: transform 600ms cubic-bezier(.55,.05,.25,1); }
  .orbit-center.is-pulsing { animation: orbit-pulse 1.4s ease-in-out infinite; }
  @keyframes orbit-pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.06); }
  }
  .orbit-stage[data-phase="syncing"] .orbit-tile,
  .orbit-stage[data-phase="done"]    .orbit-tile {
    transform: translate(calc(var(--tx) * 0.06), calc(var(--ty) * 0.06)) scale(0.55) !important;
    opacity: 0;
  }
  .orbit-stage[data-phase="done"] .ios-photos {
    box-shadow: 0 0 0 4px rgba(196,160,96,0.35), 0 2px 6px rgba(45,42,34,0.10), 0 18px 44px rgba(45,42,34,0.22);
  }

  .sync-cta.is-busy { cursor: default; }
  .sync-spinner {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid rgba(255,253,245,0.35);
    border-top-color: #fffdf5;
    animation: sync-spin 0.8s linear infinite;
  }
  @keyframes sync-spin { to { transform: rotate(360deg); } }

  /* Creator Code modal */
  .cc-modal-scrim {
    position: absolute; inset: 0; z-index: 50;
    background: rgba(45,42,34,0.32);
    display: flex; align-items: flex-end; justify-content: center;
    animation: cc-scrim-in 220ms ease both;
  }
  @keyframes cc-scrim-in { from { opacity: 0; } to { opacity: 1; } }
  .cc-modal-card {
    position: relative; width: calc(100% - 28px); margin-bottom: 28px;
    background: #fff; border-radius: 24px;
    box-shadow: 0 -8px 28px rgba(45,42,34,0.18), 0 2px 6px rgba(45,42,34,0.10);
    padding: 22px 22px 20px;
    animation: cc-card-in 280ms cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes cc-card-in { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
  .cc-modal-close {
    position: absolute; top: 14px; right: 14px;
    width: 30px; height: 30px; border-radius: 999px; border: 0;
    background: #F0EBE0; color: #2D2A22; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .cc-modal-title { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; color: #2D2A22; margin: 0; }
  .cc-modal-sub { font-size: 14px; color: #6E6557; margin: 6px 0 0; line-height: 1.4; }
  .cc-modal-input {
    margin-top: 16px; width: 100%; box-sizing: border-box;
    padding: 14px 16px; border-radius: 14px;
    background: #F4EFE3; border: 1.5px solid #E4DDD1;
    font: 700 16px/1 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #2D2A22; letter-spacing: 0.04em;
    outline: none;
  }
  .cc-modal-input::placeholder { color: #B0A898; font-weight: 700; }
  .cc-modal-input:focus { border-color: #C4A060; background: #fff; }
</style>
</head>

}

}

}

}
function IconApplePhotos({ size = 60 }) {
  const cx = 32, cy = 32, petalR = 12, dist = 13;
  const petals = [
    { c: '#FFCC00', a: -90 },
    { c: '#FF3B30', a: -30 },
    { c: '#FF2D55', a:  30 },
    { c: '#AF52DE', a:  90 },
    { c: '#0A84FF', a: 150 },
    { c: '#34C759', a: 210 },
  ];
  return (
    <svg width={size} height={size} viewBox="0 0 64 64">
      <g style={{ mixBlendMode: 'multiply' }}>
        {petals.map((p, i) => {
          const x = cx + Math.cos(p.a * Math.PI / 180) * dist;
          const y = cy + Math.sin(p.a * Math.PI / 180) * dist;
          return <circle key={i} cx={x} cy={y} r={petalR} fill={p.c} opacity="0.88"/>;
        })}
      </g>
    </svg>
  );
}
function IconImagePlus({ size = 44 }) {

}
function IconLock({ size = 12 }) {

// 4. Send to camera roll
function SendScreen({ onNext }) {
  const [phase, setPhase] = useState('idle');

  useEffect(() => {
    if (phase === 'syncing') {
      const t1 = setTimeout(() => setPhase('done'), 1600);
      return () => clearTimeout(t1);
    }
    if (phase === 'done') {
      const t2 = setTimeout(() => onNext(), 700);
      return () => clearTimeout(t2);
    }
  }, [phase, onNext]);

  const startSync = () => { if (phase === 'idle') setPhase('syncing'); };

  const orbit = [
    { angle: -90, label: 'Italy 2025', icon: <IconTravel size={20}/>, color: TILE.green,    rot: -8, delay: 0 },
    { angle: -30, label: 'Pets',       icon: <IconPets size={20}/>,   color: TILE.lavender, rot:  6, delay: 0.15 },
    { angle:  30, label: 'Fitness',    icon: <IconFitness size={20}/>,color: TILE.olive,    rot: -5, delay: 0.30 },
    { angle:  90, label: 'Family',     icon: <IconFamily size={20}/>, color: TILE.peach,    rot:  7, delay: 0.45 },
    { angle: 150, label: 'Highlights', icon: <IconSparkle size={20}/>,color: TILE.gold,     rot: -4, delay: 0.60 },
    { angle: 210, label: 'Concerts',   icon: <IconConcert size={20}/>,color: TILE.pink,     rot:  5, delay: 0.75 },
  ];

  const RING_R = 130;

  return (
    <>
      <div className="pix-stage pix-stage--centered">
        <div className="pix-screen-header">
          <div className="pix-eyebrow" style={{ marginBottom: 10 }}>Send to camera roll</div>
          <h1 className="pix-title">Push any album to<br/>your native camera roll.</h1>
          <p className="pix-sub" style={{ marginTop: 12 }}>Hand a clean folder to your editor, your group chat, or your next post in one tap.</p>
        </div>

        <div className="orbit-stage" data-phase={phase} style={{ position: 'relative', height: 340, marginTop: 10, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <svg width="320" height="320" viewBox="0 0 320 320" style={{ position: 'absolute', overflow: 'visible' }}>
            <defs>
              <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10 Z" fill="#C4A060"/>
              </marker>
            </defs>
            <circle cx="160" cy="160" r={RING_R}    fill="none" stroke="#C4A060" strokeOpacity="0.18" strokeWidth="1" strokeDasharray="2 6"/>
            <circle cx="160" cy="160" r={RING_R-44} fill="none" stroke="#C4A060" strokeOpacity="0.12" strokeWidth="1" strokeDasharray="2 6"/>
            {orbit.map((o, i) => {
              const rad = o.angle * Math.PI / 180;
              const innerR = 60;
              const outerR = RING_R - 36;
              const x1 = 160 + Math.cos(rad) * outerR;
              const y1 = 160 + Math.sin(rad) * outerR;
              const x2 = 160 + Math.cos(rad) * innerR;
              const y2 = 160 + Math.sin(rad) * innerR;
              return (
                <line key={i} className="orbit-arrow" x1={x1} y1={y1} x2={x2} y2={y2}
                      stroke="#C4A060" strokeWidth="1.5" strokeOpacity={phase === 'idle' ? 0.45 : 0.85}
                      strokeDasharray="3 5" markerEnd="url(#arrowhead)"
                      style={{ animationDelay: (i * 0.15) + 's' }}/>
              );
            })}
          </svg>

          <div className={'orbit-center ' + (phase !== 'idle' ? 'is-pulsing' : '')} style={{ position: 'relative', zIndex: 2 }}>
            <div className="ios-photos">
              <IconApplePhotos size={64}/>
            </div>
            <div style={{ marginTop: 10, textAlign: 'center', fontSize: 12, fontWeight: 700, color: '#2D2A22' }}>Photos</div>
          </div>

          {orbit.map((o, i) => {
            const rad = o.angle * Math.PI / 180;
            const x = Math.cos(rad) * RING_R;
            const y = Math.sin(rad) * RING_R;
            return (
              <div key={i}
                   className="orbit-tile"
                   style={{
                     position: 'absolute',
                     left: '50%', top: '50%',
                     marginLeft: -38, marginTop: -42,
                     '--tx': x + 'px', '--ty': y + 'px', '--rot': o.rot + 'deg',
                     transform: `translate(${x}px, ${y}px)`,
                     transition: 'transform 700ms cubic-bezier(.55,.05,.25,1), opacity 500ms ease',
                   }}>
                <div className={i % 2 === 0 ? 'pix-floater' : 'pix-floater--slow'}
                     style={{ '--rot': o.rot + 'deg', transform: `rotate(${o.rot}deg)`, animationDelay: o.delay + 's' }}>
                  <AlbumTile icon={o.icon} label={o.label} color={o.color} size="sm"/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div className="pix-foot">
        <button className={'pix-cta pix-cta--gold sync-cta' + (phase !== 'idle' ? ' is-busy' : '')} onClick={startSync} disabled={phase !== 'idle'}>
          {phase === 'idle'    && (<span>Sync to camera roll</span>)}
          {phase === 'syncing' && (<span style={{ display: 'inline-flex', alignItems: 'center', gap: 10 }}><span className="sync-spinner"/>Syncing…</span>)}
          {phase === 'done'    && (<span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}><IconCheck size={20}/>Synced</span>)}
        </button>
      </div>
    </>
  );
}

// ─── Onboarding app ────────────────────────────────────────────
const SCREENS = [
  { key: 'welcome',  label: 'Welcome',           Component: WelcomeScreen  },
  { key: 'prebuilt', label: 'Pre-built albums',  Component: PrebuiltScreen },
  { key: 'selfie',   label: 'Selfie',            Component: SelfieScreen   },
  { key: 'custom',   label: 'Custom albums',     Component: CustomScreen   },
  { key: 'send',     label: 'Send to Photos',    Component: SendScreen     },
  { key: 'finish',   label: 'All set',           Component: FinishScreen   },
  { key: 'paywall',  label: 'Paywall',           Component: PaywallScreen  },
  { key: 'settings', label: 'Settings',          Component: SettingsScreen },
];

function OnboardingApp() {
  const [index, setIndex] = useState(0);
  const [enterKey, setEnterKey] = useState(0);

  const go = useCallback((i) => {
    setIndex((prev) => {
      const next = Math.max(0, Math.min(SCREENS.length - 1, i));
      if (next !== prev) setEnterKey((k) => k + 1);
      return next;
    });
  }, []);

  const next    = useCallback(() => go(index + 1), [index, go]);
  const back    = useCallback(() => go(index - 1), [index, go]);
  const skip    = useCallback(() => go(SCREENS.length - 1), [go]);
  const restart = useCallback(() => go(0), [go]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft')  back();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [next, back]);

  const touchRef = useRef({ x: 0, y: 0, active: false });
  const onTouchStart = (e) => {
    const t = e.touches[0];
    touchRef.current = { x: t.clientX, y: t.clientY, active: true };
  };
  const onTouchEnd = (e) => {
    if (!touchRef.current.active) return;
    const t = (e.changedTouches && e.changedTouches[0]) || null;
    if (!t) return;
    const dx = t.clientX - touchRef.current.x;
    const dy = t.clientY - touchRef.current.y;
    touchRef.current.active = false;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0) next(); else back();
    }
  };

  const { Component } = SCREENS[index];

  const content = (
    <div style={{ position: 'absolute', inset: 0, background: '#F0EBE0' }}
         onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      <div className="pix-screen" data-enter="1" key={enterKey}>
        <ScreenHeader index={index} total={SCREENS.length} onBack={back} onSkip={skip}/>
        <Component onNext={next} onBack={back} onRestart={restart}/>
        {index < SCREENS.length - 1 && (
          <div style={{ display: 'flex', justifyContent: 'center', padding: '0 0 18px' }}>
            <ScreenFooterDots index={index} total={SCREENS.length}/>
          </div>
        )}
      </div>
    </div>
  );

  return (
    <div style={{ display: 'flex', gap: 36, alignItems: 'center', justifyContent: 'center' }}>
      <IOSDevice width={390} height={844}>
        {content}
      </IOSDevice>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, color: '#F0EBE0' }}>
        <div style={{ fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#8A7E6E', fontWeight: 700, marginBottom: 4 }}>Screens</div>
        {SCREENS.map((s, i) => (
          <button key={s.key} onClick={() => go(i)}
                  style={{
                    background: i === index ? '#2D2A22' : 'transparent',
                    color: i === index ? '#F0EBE0' : '#8A7E6E',
                    border: '1px solid ' + (i === index ? '#2D2A22' : '#3a3530'),
                    padding: '10px 14px', borderRadius: 12,
                    font: 'inherit', fontSize: 13, fontWeight: 600, cursor: 'pointer',
                    textAlign: 'left', minWidth: 180, display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                  }}>
            <span style={{ opacity: 0.6, marginRight: 12, fontVariantNumeric: 'tabular-nums' }}>{String(i + 1).padStart(2, '0')}</span>
            <span style={{ flex: 1 }}>{s.label}</span>
          </button>
        ))}
        <div style={{ marginTop: 12, fontSize: 11, color: '#6E6557', maxWidth: 200, lineHeight: 1.5 }}>
          ← / → keys or tap any screen above. Swipe inside the phone on touch devices.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<OnboardingApp/>);
</script>
