<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pixsort — Search Results</title>
<style>
  :root {
    --bg:     #F0EBE0;
    --frame:  #FFFCF5;
    --text:   #2D2A22;
    --muted:  #8A7E6E;
    --gold:   #C4A060;
    --gold-d: #A8864A;
    --row:    #EDE5D2;
    --row-2:  #E4DDC9;
    --red:    #D4704A;
  }

  html, body { margin: 0; padding: 0; min-height: 100%; background: #1f1d1a; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { display: flex; align-items: center; justify-content: center; padding: 40px 20px; box-sizing: border-box; min-height: 100vh; }

  .scene {
    width: 460px; height: 760px;
    background: var(--bg);
    border-radius: 36px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12);
  }

  .page-title {
    position: absolute;
    top: 24px; left: 24px;
    font-size: 32px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.03em;
    z-index: 3;
  }

  /* Search input — filled state */
  .search-input {
    position: absolute;
    top: 80px; left: 18px; right: 18px;
    background: #fff;
    border-radius: 18px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 3;
    box-shadow: 0 1px 3px rgba(45,42,34,0.06), 0 0 0 1.5px var(--gold);
  }
  .search-input-text {
    flex: 1;
    color: var(--text);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.005em;
  }
  .clear-btn {
    flex: 0 0 auto;
    width: 22px; height: 22px;
    border-radius: 999px;
    background: var(--row-2);
    border: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted);
  }

  /* Result summary + save-as-album CTA */
  .result-card {
    position: absolute;
    top: 156px; left: 18px; right: 18px;
    background: linear-gradient(135deg, #FFFCF5 0%, #F5EDD8 100%);
    border-radius: 18px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    z-index: 3;
    box-shadow: 0 2px 8px rgba(196,160,96,0.12), 0 1px 3px rgba(45,42,34,0.04);
  }
  .result-meta { display: flex; flex-direction: column; gap: 2px; }
  .result-eyebrow {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 800;
  }
  .result-count {
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.015em;
    line-height: 1.15;
  }
  .save-btn {
    background: var(--gold);
    color: #fffdf5;
    border: 0;
    border-radius: 999px;
    padding: 10px 16px;
    font: 700 13px/1 'Helvetica Neue', Helvetica, Arial, sans-serif;
    letter-spacing: -0.005em;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 0 0 auto;
    box-shadow: 0 1px 2px rgba(168,134,74,0.30), 0 4px 14px rgba(196,160,96,0.25);
    transition: transform 120ms ease, background 120ms ease;
  }
  .save-btn:active { transform: scale(0.98); background: var(--gold-d); }

  /* Photo grid */
  .photo-grid {
    position: absolute;
    top: 240px; left: 18px; right: 18px; bottom: 88px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: 136px;
    gap: 6px;
    z-index: 2;
    overflow: hidden;
  }
  .gi {
    border-radius: 8px;
    background-size: cover;
    background-position: center;
    position: relative;
    box-shadow: inset 0 0 0 0.5px rgba(45,42,34,0.05);
  }
  .gi.has-play::after {
    content: '';
    position: absolute;
    bottom: 8px; left: 8px;
    width: 0; height: 0;
    border-left: 9px solid #fff;
    border-top: 5.5px solid transparent;
    border-bottom: 5.5px solid transparent;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
  }

  /* Beach sunset gradient set */
  .gi--1  { background: linear-gradient(180deg, #FFE2B0 0%, #F09060 45%, #8E3458 90%, #2E1A38 100%); }
  .gi--2  { background: linear-gradient(180deg, #FBC56A 0%, #E87858 50%, #6B3260 100%); }
  .gi--3  { background: linear-gradient(180deg, #F5C075 0%, #C8755A 55%, #4A4470 100%); }
  .gi--4  { background: linear-gradient(180deg, #FFD68A 0%, #FA8B57 40%, #C2436A 80%, #392455 100%); }
  .gi--5  { background: linear-gradient(180deg, #FFE0B0 0%, #FFA168 50%, #6B4A6A 100%); }
  .gi--6  { background: linear-gradient(180deg, #FCB983 0%, #DA6F4B 55%, #4A2A4A 100%); }
  .gi--7  { background: linear-gradient(180deg, #F5DDB2 0%, #E89770 50%, #B25670 90%, #3A2A48 100%); }
  .gi--8  { background: linear-gradient(180deg, #FFE5B0 0%, #FF8E5A 45%, #9C405F 100%); }
  .gi--9  { background: linear-gradient(180deg, #FAC97B 0%, #E07852 50%, #5C3565 100%); }
  .gi--10 { background: linear-gradient(180deg, #FFD895 0%, #F08F5C 55%, #7A3D5A 100%); }
  .gi--11 { background: linear-gradient(180deg, #FEDC9A 0%, #F18C5D 50%, #823659 100%); }
  .gi--12 { background: linear-gradient(180deg, #FFEBC2 0%, #FBA070 45%, #BA5874 95%, #2A1A38 100%); }

  /* Tab bar */
  .tab-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 76px;
    background: var(--bg);
    border-top: 0.5px solid rgba(45,42,34,0.08);
    display: flex;
    z-index: 10;
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: transparent;
    border: 0;
    cursor: pointer;
    color: var(--muted);
    position: relative;
    text-decoration: none;
    padding-top: 4px;
  }
  .tab.is-active { color: var(--gold); }
  .tab-label { font-size: 10px; font-weight: 700; letter-spacing: 0.01em; }
  .tab-badge {
    position: absolute;
    top: 6px; left: 50%;
    transform: translateX(2px);
    background: var(--red);
    color: white;
    font-size: 9px;
    font-weight: 800;
    padding: 1px 5px;
    border-radius: 999px;
    min-width: 12px;
    text-align: center;
    line-height: 1.4;
    box-shadow: 0 1px 3px rgba(212,112,74,0.40);
  }
</style>
</head>
<body>
<div class="scene">

  <div class="page-title">Search</div>

  <div class="search-input">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C4A060" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
    <span class="search-input-text">beach sunset</span>
    <a class="clear-btn" href="search.html" aria-label="Clear">
      <svg width="10" height="10" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M3 3l8 8M11 3l-8 8"/></svg>
    </a>
  </div>

  <div class="result-card">
    <div class="result-meta">
      <div class="result-eyebrow">Pixsort found</div>
      <div class="result-count">247 matching photos</div>
    </div>
    <button class="save-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Save as album
    </button>
  </div>

  <div class="photo-grid">
    <div class="gi gi--1"></div>
    <div class="gi gi--2 has-play"></div>
    <div class="gi gi--3"></div>
    <div class="gi gi--4"></div>
    <div class="gi gi--5"></div>
    <div class="gi gi--6"></div>
    <div class="gi gi--7"></div>
    <div class="gi gi--8 has-play"></div>
    <div class="gi gi--9"></div>
    <div class="gi gi--10"></div>
    <div class="gi gi--11"></div>
    <div class="gi gi--12"></div>
  </div>

  <div class="tab-bar">
    <a class="tab" href="home.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span class="tab-label">Albums</span>
    </a>
    <a class="tab is-active" href="search.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
      <span class="tab-label">Search</span>
    </a>
    <a class="tab" href="#">
      <span class="tab-badge">282</span>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7l2 12h10l2-12"/><path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/><path d="M3 7h18"/></svg>
      <span class="tab-label">Clean Up</span>
    </a>
    <a class="tab" href="#">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
      <span class="tab-label">Settings</span>
    </a>
  </div>
</div>
</body>
</html>
